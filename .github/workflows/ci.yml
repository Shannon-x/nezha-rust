name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 检查 + 测试 ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo +nightly check --workspace
      - name: Unit tests
        run: cargo +nightly test --workspace --lib
      - name: Integration tests
        run: cargo +nightly test --workspace --test '*'
        continue-on-error: true

  # ── 判断是否需要发版 ──
  should-release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release: ${{ steps.decide.outputs.release }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide release
        id: decide
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # 手动推 tag
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
            # push 到 main，自动 bump patch
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" == chore* ]] || [[ "$COMMIT_MSG" == ci:* ]]; then
              echo "Skipping release for chore/ci commit"
              echo "release=false" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
            else
              LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
              if [ -z "$LATEST_TAG" ]; then
                NEW_TAG="v1.0.0"
              else
                VERSION=${LATEST_TAG#v}
                MAJOR=$(echo $VERSION | cut -d. -f1)
                MINOR=$(echo $VERSION | cut -d. -f2)
                PATCH=$(echo $VERSION | cut -d. -f3)
                NEW_PATCH=$((PATCH + 1))
                NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
              fi
              echo "Auto-release: $LATEST_TAG -> $NEW_TAG"
              echo "release=true" >> "$GITHUB_OUTPUT"
              echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

              # 创建 tag
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
              git push origin "$NEW_TAG"
            fi
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

  # ── 构建前端 + 下载 GeoIP ──
  frontend:
    needs: should-release
    if: needs.should-release.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Admin Frontend
        run: |
          git clone --depth 1 https://github.com/nezhahq/admin-frontend.git
          cd admin-frontend
          npm install --legacy-peer-deps
          npm run build

      - name: Build User Frontend (nezha-dash)
        run: |
          git clone --depth 1 https://github.com/hamster1963/nezha-dash.git
          cd nezha-dash
          npm install --legacy-peer-deps
          npm run build

      - name: Download GeoIP Database
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          echo "Downloading IPinfo GeoIP database..."
          curl -fsSL -o geoip.db "https://ipinfo.io/data/free/country.mmdb?token=${IPINFO_TOKEN}"
          ls -lh geoip.db
          echo "GeoIP database downloaded."

      - name: Package frontend + geoip
        run: |
          mkdir -p resource
          cp -r nezha-dash/dist/* resource/ 2>/dev/null || true
          cp -r nezha-dash/dist resource/user 2>/dev/null || true
          cp -r admin-frontend/dist resource/admin 2>/dev/null || true
          cp geoip.db resource/geoip.db
          tar czf frontend-dist.tar.gz resource/

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 1

  # ── 多平台构建 ──
  build:
    needs: [should-release, frontend]
    if: needs.should-release.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-arm64
            cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-armv7
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-amd64-musl
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-arm64-musl
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nezha-dashboard-darwin-amd64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: nezha-dashboard-darwin-arm64
            cross: false
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            artifact: nezha-dashboard-freebsd-amd64
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Extract frontend
        run: tar xzf frontend-dist.tar.gz

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo +nightly build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross +nightly build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nezha-dashboard dist/ 2>/dev/null || \
          cp target/${{ matrix.target }}/release/nezha-dashboard.exe dist/ 2>/dev/null || true
          cp -r resource dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *
          cd ..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 2>/dev/null || \
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  # ── Docker 镜像 ──
  docker:
    needs: should-release
    if: needs.should-release.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.should-release.outputs.tag }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IPINFO_TOKEN=${{ secrets.IPINFO_TOKEN }}

  # ── GitHub Release ──
  release:
    needs: [should-release, build, docker]
    if: needs.should-release.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nezha-dashboard-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.should-release.outputs.tag }}
          generate_release_notes: true
          files: |
            nezha-dashboard-*.tar.gz
            nezha-dashboard-*.sha256
