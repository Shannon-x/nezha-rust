name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 检查 + 测试 ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo +nightly check --workspace
      - name: Test
        run: cargo +nightly test --workspace

  # ── 多平台构建（仅 tag 触发）──
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-arm64
            cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-armv7
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-amd64-musl
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: nezha-dashboard-linux-arm64-musl
            cross: true
          # ── macOS ──
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nezha-dashboard-darwin-amd64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: nezha-dashboard-darwin-arm64
            cross: false
          # ── FreeBSD (via cross) ──
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            artifact: nezha-dashboard-freebsd-amd64
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # 使用 cross 进行交叉编译
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # 原生编译
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo +nightly build --release --target ${{ matrix.target }}

      # 交叉编译
      - name: Build (cross)
        if: matrix.cross
        run: cross +nightly build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/nezha-dashboard ${{ matrix.artifact }} 2>/dev/null || \
          cp target/${{ matrix.target }}/release/nezha-dashboard.exe ${{ matrix.artifact }}.exe 2>/dev/null || true
          chmod +x ${{ matrix.artifact }} 2>/dev/null || true
          sha256sum ${{ matrix.artifact }}* > ${{ matrix.artifact }}.sha256 2>/dev/null || \
          shasum -a 256 ${{ matrix.artifact }}* > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}*

  # ── Docker 镜像 ──
  docker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nezha-dashboard-*
